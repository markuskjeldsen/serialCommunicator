name: Auto Tag, Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          git fetch --tags
          tag=$(git tag --sort=-v:refname | head -n 1)
          echo "latest_tag=$tag" >> $GITHUB_OUTPUT

      - name: Bump version
        id: tag
        run: |
          latest="${{ steps.get_tag.outputs.latest_tag }}"
          if [ -z "$latest" ]; then
            new_tag="v0.0.1"
          else
            version=${latest#v}
            IFS='.' read -r major minor patch <<< "$version"
            patch=$((patch + 1))
            new_tag="v$major.$minor.$patch"
          fi

          echo "New tag: $new_tag"
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $new_tag
          git push origin $new_tag

  build:
    needs: tag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build x86
        run: go build -o serialcom-x86 .

      - name: Build ARM64
        run: GOOS=linux GOARCH=arm64 go build -o serialcom-arm64 .

      - name: Rename binaries
        run: |
          mv serialcom-x86 serialcom-x86-${{ needs.tag.outputs.new_tag }}
          mv serialcom-arm64 serialcom-arm64-${{ needs.tag.outputs.new_tag }}

      - uses: actions/upload-artifact@v4
        with:
          name: serialcom
          path: serialcom-*

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: serialcom

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          files: serialcom-*
